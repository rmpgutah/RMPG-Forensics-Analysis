appId: com.rmpg.forensics
productName: RMPG Forensics Analysis
directories:
  buildResources: resources
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  artifactName: RMPG-Forensics-Analysis-${version}-Setup.${ext}
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: resources/icons/icon.icns
  category: public.app-category.utilities
  hardenedRuntime: true
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  artifactName: RMPG-Forensics-Analysis-${version}-${arch}.${ext}
dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icons
  category: Utility
  artifactName: RMPG-Forensics-Analysis-${version}-${arch}.${ext}
publish:
  provider: generic
  url: https://rmpgutah.us/downloads/updates
